<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Dashboard - Slim</title>
    <style>
        /* CSS Variables - Supports Light & Dark Themes */
        :root {
            --bg-color: #0b0b0d;
            --widget-bg: #161619;
            --task-bg: #222226;
            --modal-bg: #1c1c20;
            --text-primary: #ffffff;
            --text-secondary: #999999;
            --text-accent: #666666;
            --border-color: #333333;
            --border-radius: 24px;
            --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            --accent-color: #ff5e3a;
        }

        /* Light Theme Overrides */
        body.light-theme {
            --bg-color: #f2f2f7;
            --widget-bg: #ffffff;
            --task-bg: #e5e5ea;
            --modal-bg: #ffffff;
            --text-primary: #000000;
            --text-secondary: #666666;
            --text-accent: #8e8e93;
            --border-color: #d1d1d6;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            margin: 0;
            padding: 24px 16px;
            display: flex;
            justify-content: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 0 4px;
        }

        #greeting-time {
            font-size: 20px;
            font-weight: 300;
            color: var(--text-secondary);
        }

        h1#user-name {
            font-size: 42px;
            font-weight: 400;
            margin: 2px 0 0;
            letter-spacing: -0.5px;
        }

        /* 3D Gear Icon */
        .gear-icon {
            width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .gear-icon svg {
            filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.4));
            transition: transform 0.2s ease;
        }

        .gear-icon:active svg {
            transform: scale(0.92) rotate(30deg);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .widget {
            background-color: var(--widget-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease;
        }

        .widget-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-accent);
            font-weight: 500;
            margin-bottom: 12px;
        }

        #today-mon {
            font-size: 22px;
            font-weight: 300;
            color: var(--text-secondary);
        }

        #today-date {
            font-size: 64px;
            font-weight: 300;
            line-height: 1;
            margin: 4px 0 16px;
        }

        .streak-info {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .text-input {
            width: 100%;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 17px;
            font-weight: 300;
            resize: none;
            padding: 0;
            margin-top: 4px;
            line-height: 1.4;
            font-family: inherit;
        }

        .text-input:focus {
            outline: none;
            color: var(--text-primary);
        }

        #verse-input {
            height: 90px;
        }

        /* Calendar Styling */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .calendar-nav {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .calendar-month-title {
            font-size: 15px;
            font-weight: 600;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }

        .cal-day-name {
            font-size: 11px;
            color: var(--text-accent);
            font-weight: 600;
            padding-bottom: 4px;
        }

        .cal-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            font-size: 13px;
            cursor: pointer;
            position: relative;
            color: var(--text-primary);
        }

        .cal-day:hover {
            background-color: var(--task-bg);
        }

        .cal-day.today {
            border: 1px solid var(--accent-color);
            font-weight: bold;
        }

        .cal-day.selected {
            background-color: var(--accent-color) !important;
            color: #ffffff !important;
        }

        .cal-day.has-event::after {
            content: '';
            width: 4px;
            height: 4px;
            background-color: var(--accent-color);
            border-radius: 50%;
            position: absolute;
            bottom: 3px;
        }

        /* Schedule Styling */
        .schedule-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .btn-small {
            background-color: var(--task-bg);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
        }

        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .schedule-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: var(--task-bg);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
        }

        .schedule-time {
            color: var(--accent-color);
            font-size: 12px;
            font-weight: 600;
            min-width: 65px;
        }

        .schedule-text {
            flex-grow: 1;
            color: var(--text-primary);
        }

        .schedule-delete {
            background: none;
            border: none;
            color: var(--text-accent);
            cursor: pointer;
        }

        /* Tasks Styling */
        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .task-filters {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .filter-btn {
            background: none;
            border: none;
            color: var(--text-accent);
            font-size: 12px;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 8px;
        }

        .filter-btn.active {
            background-color: var(--task-bg);
            color: var(--text-primary);
        }

        #task-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-item {
            background-color: var(--task-bg);
            border-radius: 16px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .task-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .task-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--text-accent);
            border-radius: 50%;
            background-color: transparent;
            cursor: pointer;
        }

        .task-content {
            display: flex;
            flex-direction: column;
        }

        .task-title {
            font-size: 15px;
            color: var(--text-primary);
        }

        .task-meta {
            font-size: 11px;
            color: var(--text-accent);
            margin-top: 2px;
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .badge {
            padding: 1px 6px;
            border-radius: 6px;
            font-size: 10px;
            text-transform: uppercase;
        }

        .badge-high { background-color: rgba(255, 94, 58, 0.2); color: #ff5e3a; }
        .badge-medium { background-color: rgba(255, 184, 0, 0.2); color: #ffb800; }
        .badge-low { background-color: rgba(0, 200, 81, 0.2); color: #00c851; }

        .task-delete {
            background: none;
            border: none;
            color: var(--text-accent);
            font-size: 18px;
            padding: 0 4px;
            cursor: pointer;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: var(--text-accent);
        }

        .task-item.completed .task-checkbox {
            border-color: var(--text-accent);
            background-color: var(--text-accent);
        }

        /* Modal / Sheet Overlay */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 100;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background-color: var(--modal-bg);
            width: 100%;
            max-width: 480px;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transform: translateY(100%);
            transition: transform 0.25s ease;
        }

        .modal-overlay.open .modal {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 500;
            margin: 0 0 8px 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 12px;
            color: var(--text-accent);
            text-transform: uppercase;
        }

        .form-input, .form-select {
            background-color: var(--task-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .btn-primary {
            flex: 1;
            background-color: var(--text-primary);
            color: var(--bg-color);
            border: none;
            border-radius: 14px;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-secondary {
            flex: 1;
            background-color: var(--task-bg);
            color: var(--text-primary);
            border: none;
            border-radius: 14px;
            padding: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <div id="greeting-time">Good evening</div>
            <h1 id="user-name">Slim</h1>
        </div>
        <div class="gear-icon" onclick="openSettingsModal()">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
            </svg>
        </div>
    </header>

    <div class="grid-2">
        <div class="widget">
            <div class="widget-label">Today</div>
            <div id="today-mon">Mon</div>
            <div id="today-date">20</div>
            <div class="streak-info">🔥 <span id="streak-count">0</span> day streak</div>
        </div>

        <div class="widget">
            <div class="widget-label">The Week's Verse</div>
            <textarea id="verse-input" class="text-input" placeholder="Enter verse..."></textarea>
        </div>
    </div>

    <!-- Calendar Widget -->
    <div class="widget">
        <div class="calendar-header">
            <div class="calendar-month-title" id="cal-month-year">July 2026</div>
            <div class="calendar-nav">
                <button class="btn-small" onclick="prevMonth()">&lt;</button>
                <button class="btn-small" onclick="nextMonth()">&gt;</button>
            </div>
        </div>
        <div class="cal-grid">
            <div class="cal-day-name">S</div>
            <div class="cal-day-name">M</div>
            <div class="cal-day-name">T</div>
            <div class="cal-day-name">W</div>
            <div class="cal-day-name">T</div>
            <div class="cal-day-name">F</div>
            <div class="cal-day-name">S</div>
        </div>
        <div class="cal-grid" id="cal-days-grid" style="margin-top: 6px;"></div>
    </div>

    <!-- Schedule Widget -->
    <div class="widget">
        <div class="schedule-header">
            <div class="widget-label" style="margin:0;">Today's Schedule</div>
            <button class="btn-small" onclick="addScheduleItem()">+ time</button>
        </div>
        <div class="schedule-list" id="schedule-list"></div>
    </div>

    <!-- Tasks Widget -->
    <div class="widget">
        <div class="tasks-header">
            <div class="widget-label" style="margin:0;">Today's Tasks</div>
            <button class="btn-small" onclick="openAddTaskModal()">+ add</button>
        </div>
        <div class="task-filters">
            <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
            <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
            <button class="filter-btn" onclick="setFilter('completed', this)">Done</button>
        </div>
        <ul id="task-list"></ul>
    </div>
</div>

<!-- Calendar Event Modal -->
<div class="modal-overlay" id="event-modal">
    <div class="modal">
        <h3 class="modal-title" id="event-modal-title">Date Events</h3>
        <div id="existing-events-list" style="display:flex; flex-direction:column; gap:8px; margin-bottom:8px;"></div>
        <div class="form-group">
            <label>Add Important Day / Event</label>
            <input type="text" id="event-title-input" class="form-input" placeholder="e.g. Birthday, Launch, Exam">
        </div>
        <div class="modal-buttons">
            <button class="btn-secondary" onclick="closeModal('event-modal')">Close</button>
            <button class="btn-primary" onclick="saveCalendarEvent()">Save Event</button>
        </div>
    </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="task-modal">
    <div class="modal">
        <h3 class="modal-title">New Task</h3>
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="task-title-input" class="form-input" placeholder="What needs to be done?">
        </div>
        <div class="form-group">
            <label>Category</label>
            <select id="task-cat-input" class="form-select">
                <option value="Personal">Personal</option>
                <option value="Work">Work</option>
                <option value="Health">Health</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Priority</label>
            <select id="task-prio-input" class="form-select">
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
        </div>
        <div class="modal-buttons">
            <button class="btn-secondary" onclick="closeModal('task-modal')">Cancel</button>
            <button class="btn-primary" onclick="saveNewTask()">Add Task</button>
        </div>
    </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal">
    <div class="modal">
        <h3 class="modal-title">Settings</h3>
        <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="setting-name-input" class="form-input">
        </div>
        <div class="form-group">
            <label>Current Streak (Days)</label>
            <input type="number" id="setting-streak-input" class="form-input">
        </div>
        <div class="toggle-row">
            <span>Theme Mode</span>
            <button class="btn-small" id="theme-toggle-btn" onclick="toggleTheme()">Dark Theme</button>
        </div>
        <div class="modal-buttons">
            <button class="btn-secondary" onclick="closeModal('settings-modal')">Cancel</button>
            <button class="btn-primary" onclick="saveSettings()">Save Changes</button>
        </div>
    </div>
</div>

<script>
    function getData() {
        const data = localStorage.getItem('slimDataV4');
        return data ? JSON.parse(data) : { 
            userName: 'Slim',
            streak: 0,
            theme: 'dark',
            verse: '', 
            events: {}, // Format: { "YYYY-MM-DD": ["Event 1", "Event 2"] }
            schedule: [{ time: '09:00 AM', text: 'Morning Focus' }], 
            tasks: [{ id: 1, title: 'Build app interface', category: 'Work', priority: 'high', completed: false }] 
        };
    }

    function saveData(data) {
        localStorage.setItem('slimDataV4', JSON.stringify(data));
    }

    const appData = getData();
    let currentFilter = 'all';
    let calDate = new Date();
    let selectedDateKey = '';

    // Apply Theme
    function applyTheme() {
        if (appData.theme === 'light') {
            document.body.classList.add('light-theme');
            document.getElementById('theme-toggle-btn').textContent = 'Light Theme';
        } else {
            document.body.classList.remove('light-theme');
            document.getElementById('theme-toggle-btn').textContent = 'Dark Theme';
        }
    }

    function toggleTheme() {
        appData.theme = appData.theme === 'light' ? 'dark' : 'light';
        applyTheme();
        saveData(appData);
    }

    function updateHeader() {
        const now = new Date();
        const hours = now.getHours();
        let greeting = 'Good morning';
        if (hours >= 12 && hours < 17) greeting = 'Good afternoon';
        if (hours >= 17) greeting = 'Good evening';
        
        document.getElementById('greeting-time').textContent = greeting;
        document.getElementById('user-name').textContent = appData.userName || 'Slim';
        document.getElementById('streak-count').textContent = appData.streak || 0;
        
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        document.getElementById('today-mon').textContent = days[now.getDay()];
        document.getElementById('today-date').textContent = now.getDate();
    }

    // Verse Input
    const verseInput = document.getElementById('verse-input');
    verseInput.value = appData.verse || '';
    verseInput.addEventListener('input', () => {
        appData.verse = verseInput.value;
        saveData(appData);
    });

    // Calendar System
    function renderCalendar() {
        const year = calDate.getFullYear();
        const month = calDate.getMonth();
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        
        document.getElementById('cal-month-year').textContent = `${monthNames[month]} ${year}`;
        
        const grid = document.getElementById('cal-days-grid');
        grid.innerHTML = '';

        const firstDay = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();
        const today = new Date();

        // Empty slots for alignment
        for (let i = 0; i < firstDay; i++) {
            grid.appendChild(document.createElement('div'));
        }

        for (let day = 1; day <= totalDays; day++) {
            const dayEl = document.createElement('div');
            dayEl.className = 'cal-day';
            dayEl.textContent = day;

            const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            
            if (today.getFullYear() === year && today.getMonth() === month && today.getDate() === day) {
                dayEl.classList.add('today');
            }

            if (appData.events && appData.events[dateKey] && appData.events[dateKey].length > 0) {
                dayEl.classList.add('has-event');
            }

            dayEl.onclick = () => openCalendarEventModal(dateKey, day, monthNames[month], year);
            grid.appendChild(dayEl);
        }
    }

    function prevMonth() { calDate.setMonth(calDate.getMonth() - 1); renderCalendar(); }
    function nextMonth() { calDate.setMonth(calDate.getMonth() + 1); renderCalendar(); }

    function openCalendarEventModal(dateKey, day, monthName, year) {
        selectedDateKey = dateKey;
        document.getElementById('event-modal-title').textContent = `${monthName} ${day}, ${year}`;
        
        const list = document.getElementById('existing-events-list');
        list.innerHTML = '';

        const existingEvents = (appData.events && appData.events[dateKey]) || [];
        if (existingEvents.length === 0) {
            list.innerHTML = '<div style="font-size:13px; color:var(--text-accent);">No events for this day.</div>';
        } else {
            existingEvents.forEach((ev, idx) => {
                const item = document.createElement('div');
                item.className = 'schedule-item';
                item.innerHTML = `<span class="schedule-text">${ev}</span><button class="schedule-delete" onclick="deleteCalendarEvent(${idx})">&times;</button>`;
                list.appendChild(item);
            });
        }

        document.getElementById('event-title-input').value = '';
        document.getElementById('event-modal').classList.add('open');
    }

    function saveCalendarEvent() {
        const text = document.getElementById('event-title-input').value.trim();
        if (text) {
            if (!appData.events) appData.events = {};
            if (!appData.events[selectedDateKey]) appData.events[selectedDateKey] = [];
            appData.events[selectedDateKey].push(text);
            saveData(appData);
            renderCalendar();
            closeModal('event-modal');
        }
    }

    function deleteCalendarEvent(index) {
        if (appData.events && appData.events[selectedDateKey]) {
            appData.events[selectedDateKey].splice(index, 1);
            if (appData.events[selectedDateKey].length === 0) delete appData.events[selectedDateKey];
            saveData(appData);
            renderCalendar();
            closeModal('event-modal');
        }
    }

    // Schedule System
    function renderSchedule() {
        const container = document.getElementById('schedule-list');
        container.innerHTML = '';
        if (appData.schedule.length === 0) {
            container.innerHTML = '<div style="color:var(--text-accent); font-size:13px;">No schedule items set.</div>';
            return;
        }
        appData.schedule.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'schedule-item';
            div.innerHTML = `
                <span class="schedule-time">${item.time}</span>
                <span class="schedule-text">${item.text}</span>
                <button class="schedule-delete" onclick="deleteScheduleItem(${index})">&times;</button>
            `;
            container.appendChild(div);
        });
    }

    function addScheduleItem() {
        const time = prompt('Time slot (e.g., 10:30 AM):', '10:00 AM');
        if (!time) return;
        const text = prompt('Event description:', 'Meeting / Work');
        if (text) {
            appData.schedule.push({ time, text });
            saveData(appData);
            renderSchedule();
        }
    }

    function deleteScheduleItem(index) {
        appData.schedule.splice(index, 1);
        saveData(appData);
        renderSchedule();
    }

    // Task System
    function setFilter(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTasks();
    }

    function renderTasks() {
        const taskList = document.getElementById('task-list');
        taskList.innerHTML = '';
        
        const filteredTasks = appData.tasks.filter(t => {
            if (currentFilter === 'active') return !t.completed;
            if (currentFilter === 'completed') return t.completed;
            return true;
        });

        filteredTasks.forEach((task) => {
            const index = appData.tasks.findIndex(t => t.id === task.id);
            const li = document.createElement('li');
            li.className = `task-item ${task.completed ? 'completed' : ''}`;
            li.innerHTML = `
                <div class="task-left">
                    <div class="task-checkbox" onclick="toggleTask(${index})"></div>
                    <div class="task-content">
                        <span class="task-title">${task.title}</span>
                        <div class="task-meta">
                            <span>${task.category}</span> &middot; 
                            <span class="badge badge-${task.priority}">${task.priority}</span>
                        </div>
                    </div>
                </div>
                <button class="task-delete" onclick="deleteTask(${index})">&times;</button>
            `;
            taskList.appendChild(li);
        });
    }

    function openAddTaskModal() { document.getElementById('task-modal').classList.add('open'); }

    function saveNewTask() {
        const title = document.getElementById('task-title-input').value.trim();
        const category = document.getElementById('task-cat-input').value;
        const priority = document.getElementById('task-prio-input').value;

        if (title) {
            appData.tasks.unshift({ id: Date.now(), title, category, priority, completed: false });
            saveData(appData);
            renderTasks();
            document.getElementById('task-title-input').value = '';
            closeModal('task-modal');
        }
    }

    function toggleTask(index) {
        appData.tasks[index].completed = !appData.tasks[index].completed;
        saveData(appData);
        renderTasks();
    }

    function deleteTask(index) {
        appData.tasks.splice(index, 1);
        saveData(appData);
        renderTasks();
    }

    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function openSettingsModal() {
        document.getElementById('setting-name-input').value = appData.userName || 'Slim';
        document.getElementById('setting-streak-input').value = appData.streak || 0;
        document.getElementById('settings-modal').classList.add('open');
    }

    function saveSettings() {
        const name = document.getElementById('setting-name-input').value.trim();
        const streak = parseInt(document.getElementById('setting-streak-input').value, 10);
        
        if (name) appData.userName = name;
        if (!isNaN(streak)) appData.streak = streak;

        saveData(appData);
        updateHeader();
        closeModal('settings-modal');
    }

    // Initialize
    applyTheme();
    updateHeader();
    renderCalendar();
    renderSchedule();
    renderTasks();
</script>

</body>
</html>
