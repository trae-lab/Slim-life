<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Dashboard - Notes & Budget</title>
  <style>
    :root {
      --bg-dark: #121214;
      --card-bg: #1e1e22;
      --accent: #ffffff;
      --text-muted: #a1a1aa;
      --border: #27272a;
      --green: #4ade80;
    }

    body {
      background-color: var(--bg-dark);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 24px;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    /* --- 3D Icons --- */
    .icon-3d-note {
      width: 48px;
      height: 48px;
      background: #2a2a2e;
      border-radius: 12px;
      box-shadow: 0 6px 0 #000, 0 12px 18px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #3f3f46;
      font-size: 20px;
      transform: perspective(500px) rotateX(10deg);
    }

    .icon-3d-folder {
      width: 48px;
      height: 44px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transform: perspective(500px) rotateY(-8deg) rotateX(4deg);
    }

    .header-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* --- UI Components --- */
    .btn {
      background: #27272a;
      color: #fff;
      border: 1px solid #3f3f46;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn:hover { background: #3f3f46; }

    .section-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .list-item {
      background: #141416;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border);
    }

    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      background: #27272a;
      color: var(--text-muted);
    }

    .progress-bar {
      height: 6px;
      background: #27272a;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: #fff;
      transition: width 0.3s ease;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 14px;
      margin-left: 8px;
    }
  </style>
</head>
<body>

  <div class="dashboard-grid">

    <!-- ================= NOTES & GOALS SECTION ================= -->
    <section class="card">
      <div class="header-title">
        <div class="header-left">
          <div class="icon-3d-note">📝</div>
          <h2>Notes & Goals</h2>
        </div>
        <button class="btn" onclick="addNote()">+ Note</button>
      </div>

      <div class="section-split">
        <!-- Notes Column -->
        <div>
          <h3>Notes</h3>
          <div id="notes-container"></div>
        </div>

        <!-- Goals Column -->
        <div>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Goals</h3>
            <button class="btn" style="padding:4px 8px; font-size:12px;" onclick="addGoal()">+ Goal</button>
          </div>
          <div id="goals-container"></div>
        </div>
      </div>
    </section>

    <!-- ================= BUDGET PLANNER SECTION ================= -->
    <section class="card">
      <div class="header-title">
        <div class="header-left">
          <div class="icon-3d-folder">📁</div>
          <h2>Budget Planner</h2>
        </div>
        <button class="btn" onclick="addProject()">+ Project Budget</button>
      </div>

      <!-- Active Projects -->
      <h3>Project Budgets</h3>
      <div id="projects-container"></div>

      <hr style="border-color: var(--border); margin: 24px 0;">

      <!-- Recurring Expenses -->
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>Recurring Monthly Spendings</h3>
        <button class="btn" style="padding:4px 8px; font-size:12px;" onclick="addExpense()">+ Expense</button>
      </div>
      <div id="expenses-container"></div>

      <!-- Overall Summary -->
      <div style="margin-top: 20px; padding: 16px; background: #141416; border: 1px solid var(--border); border-radius: 8px; display: flex; justify-content: space-between; align-items: center;">
        <span><strong>Total Recurring Overhead:</strong></span>
        <strong id="recurring-total" style="color: var(--green); font-size: 18px;">$0.00</strong>
      </div>
    </section>

  </div>

  <script>
    // Initial State Structure
    let state = JSON.parse(localStorage.getItem('dashboard_data')) || {
      notes: [
        { id: 1, title: 'App Ideas', desc: 'Build local storage budget feature.' }
      ],
      goals: [
        { id: 1, title: 'Launch Website', progress: 70 }
      ],
      projects: [
        { id: 1, name: 'Setup Server', spent: 150, total: 300 }
      ],
      expenses: [
        { id: 1, name: 'Netflix Subscription', category: 'Subscriptions', cost: 15 },
        { id: 2, name: 'Groceries', category: 'Shopping', cost: 350 }
      ]
    };

    function saveState() {
      localStorage.setItem('dashboard_data', JSON.stringify(state));
      render();
    }

    // Render Functions
    function render() {
      // 1. Render Notes
      const notesContainer = document.getElementById('notes-container');
      notesContainer.innerHTML = state.notes.map(n => `
        <div class="list-item" style="display:block;">
          <div style="display:flex; justify-content:space-between;">
            <strong>${n.title}</strong>
            <button class="delete-btn" onclick="deleteItem('notes', ${n.id})">✕</button>
          </div>
          <div style="font-size:12px; color:var(--text-muted); margin-top:4px;">${n.desc}</div>
        </div>
      `).join('');

      // 2. Render Goals
      const goalsContainer = document.getElementById('goals-container');
      goalsContainer.innerHTML = state.goals.map(g => `
        <div class="list-item" style="display:block;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span>${g.title}</span>
            <div>
              <span class="badge">${g.progress}%</span>
              <button class="delete-btn" onclick="deleteItem('goals', ${g.id})">✕</button>
            </div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width: ${g.progress}%;"></div></div>
        </div>
      `).join('');

      // 3. Render Project Budgets
      const projectsContainer = document.getElementById('projects-container');
      projectsContainer.innerHTML = state.projects.map(p => {
        const percent = Math.min(Math.round((p.spent / p.total) * 100), 100);
        return `
          <div class="list-item" style="display:block;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <strong>${p.name}</strong>
              <div>
                <span style="font-size:13px; color:var(--text-muted);">$${p.spent} / $${p.total}</span>
                <button class="delete-btn" onclick="deleteItem('projects', ${p.id})">✕</button>
              </div>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div>
          </div>
        `;
      }).join('');

      // 4. Render Recurring Expenses & Total
      const expensesContainer = document.getElementById('expenses-container');
      let totalExpense = 0;
      expensesContainer.innerHTML = state.expenses.map(e => {
        totalExpense += Number(e.cost);
        return `
          <div class="list-item">
            <div>
              <span>${e.name}</span>
              <span class="badge" style="margin-left:8px;">${e.category}</span>
            </div>
            <div>
              <strong>$${e.cost}/mo</strong>
              <button class="delete-btn" onclick="deleteItem('expenses', ${e.id})">✕</button>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('recurring-total').innerText = `$${totalExpense.toFixed(2)}`;
    }

    // Action Methods
    function addNote() {
      const title = prompt('Note Title:');
      const desc = prompt('Note Details:');
      if (title) {
        state.notes.push({ id: Date.now(), title, desc: desc || '' });
        saveState();
      }
    }

    function addGoal() {
      const title = prompt('Goal Title:');
      const progress = prompt('Progress percentage (0-100):', '0');
      if (title) {
        state.goals.push({ id: Date.now(), title, progress: Number(progress) || 0 });
        saveState();
      }
    }

    function addProject() {
      const name = prompt('Project Name:');
      const total = prompt('Total Estimated Budget ($):');
      const spent = prompt('Initial Spent Amount ($):', '0');
      if (name && total) {
        state.projects.push({ id: Date.now(), name, total: Number(total), spent: Number(spent) });
        saveState();
      }
    }

    function addExpense() {
      const name = prompt('Expense Name (e.g. Electric Bill, Grocery):');
      const category = prompt('Category (Bills, Subscriptions, Shopping):', 'Bills');
      const cost = prompt('Monthly Cost ($):');
      if (name && cost) {
        state.expenses.push({ id: Date.now(), name, category: category || 'General', cost: Number(cost) });
        saveState();
      }
    }

    function deleteItem(type, id) {
      state[type] = state[type].filter(item => item.id !== id);
      saveState();
    }

    // Initialize App
    render();
  </script>
</body>
</html>
