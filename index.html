<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Dashboard - Slim</title>
    <style>
        :root {
            --bg-color: #0b0b0d;
            --widget-bg: #161619;
            --task-bg: #222226;
            --text-primary: #ffffff;
            --text-secondary: #999999;
            --text-accent: #666666;
            --border-radius: 24px;
            --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            margin: 0;
            padding: 24px 16px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 0 4px;
        }

        #greeting-time {
            font-size: 20px;
            font-weight: 300;
            color: var(--text-secondary);
        }

        h1#user-name {
            font-size: 42px;
            font-weight: 400;
            margin: 2px 0 0;
            letter-spacing: -0.5px;
        }

        /* 3D Gear Icon Styles */
        .gear-icon {
            width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .gear-icon svg {
            /* Neumorphic 3D drop shadow effect on the SVG path */
            filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.9)) 
                    drop-shadow(-1px -1px 3px rgba(255, 255, 255, 0.15));
            transition: transform 0.2s ease;
        }

        .gear-icon:active svg {
            transform: scale(0.95);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .widget {
            background-color: var(--widget-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .widget-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-accent);
            font-weight: 500;
            margin-bottom: 12px;
        }

        #today-mon {
            font-size: 22px;
            font-weight: 300;
            color: var(--text-secondary);
        }

        #today-date {
            font-size: 64px;
            font-weight: 300;
            line-height: 1;
            margin: 4px 0 16px;
        }

        .streak-info {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Shared Input Styles for Verse and Schedule */
        .text-input {
            width: 100%;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 18px;
            font-weight: 300;
            resize: none;
            padding: 0;
            margin-top: 4px;
            line-height: 1.4;
            font-family: inherit;
        }

        .text-input:focus {
            outline: none;
            color: var(--text-primary);
        }

        #verse-input {
            height: 90px;
        }

        #schedule-input {
            height: 60px;
        }

        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        #add-task-btn {
            background-color: #2a2a30;
            color: var(--text-secondary);
            border: 1px solid #444;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
        }

        #task-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-item {
            background-color: var(--task-bg);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .task-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .task-status-dot {
            width: 8px;
            height: 8px;
            background-color: #ffffff;
            border-radius: 50%;
        }

        .task-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #666;
            border-radius: 50%;
            background-color: transparent;
        }

        .task-content {
            display: flex;
            flex-direction: column;
        }

        .task-title {
            font-size: 16px;
            color: var(--text-primary);
        }

        .task-meta {
            font-size: 12px;
            color: var(--text-accent);
            margin-top: 2px;
        }

        .task-delete {
            background: none;
            border: none;
            color: #666;
            font-size: 20px;
            padding: 0 8px;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: var(--text-accent);
        }

        .task-item.completed .task-checkbox {
            border-color: #444;
            background-color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <div id="greeting-time">Good evening</div>
            <h1 id="user-name">Slim</h1>
        </div>
        <!-- Integrated 3D Gear Icon -->
        <div class="gear-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="#e0e0e0" xmlns="http://www.w3.org/2000/svg">
                <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
            </svg>
        </div>
    </header>

    <div class="grid-2">
        <div class="widget">
            <div class="widget-label">Today</div>
            <div id="today-mon">Mon</div>
            <div id="today-date">20</div>
            <div class="streak-info">🔥 0 day streak</div>
        </div>

        <div class="widget">
            <div class="widget-label">The Week's Verse</div>
            <textarea id="verse-input" class="text-input" placeholder="Enter verse..."></textarea>
        </div>
    </div>

    <div class="widget">
        <div class="widget-label">Today's Schedule</div>
        <textarea id="schedule-input" class="text-input" placeholder="What's on the agenda?"></textarea>
    </div>

    <div class="widget">
        <div class="tasks-header">
            <div class="widget-label" style="margin:0;">Today's Tasks</div>
            <button id="add-task-btn" onclick="addTask()">+ add</button>
        </div>
        <ul id="task-list"></ul>
    </div>
</div>

<script>
    function getData() {
        const data = localStorage.getItem('slimDataV2');
        return data ? JSON.parse(data) : { 
            verse: '', 
            schedule: '', 
            tasks: [{ id: 1, title: 'Buy car', category: 'Other', priority: 'high', completed: false }] 
        };
    }

    function saveData(data) {
        localStorage.setItem('slimDataV2', JSON.stringify(data));
    }

    const appData = getData();

    function updateHeader() {
        const now = new Date();
        const hours = now.getHours();
        let greeting = 'Good morning';
        if (hours >= 12 && hours < 17) greeting = 'Good afternoon';
        if (hours >= 17) greeting = 'Good evening';
        
        document.getElementById('greeting-time').textContent = greeting;
        
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        document.getElementById('today-mon').textContent = days[now.getDay()];
        document.getElementById('today-date').textContent = now.getDate();
    }

    // Verse Input Logic
    const verseInput = document.getElementById('verse-input');
    verseInput.value = appData.verse;
    verseInput.addEventListener('input', () => {
        appData.verse = verseInput.value;
        saveData(appData);
    });

    // Schedule Input Logic
    const scheduleInput = document.getElementById('schedule-input');
    scheduleInput.value = appData.schedule;
    scheduleInput.addEventListener('input', () => {
        appData.schedule = scheduleInput.value;
        saveData(appData);
    });

    function renderTasks() {
        const taskList = document.getElementById('task-list');
        taskList.innerHTML = '';
        appData.tasks.forEach((task, index) => {
            const li = document.createElement('li');
            li.className = `task-item ${task.completed ? 'completed' : ''}`;
            li.innerHTML = `
                <div class="task-left">
                    <div class="task-status-dot"></div>
                    <div onclick="toggleTask(${index})"><div class="task-checkbox"></div></div>
                    <div class="task-content">
                        <span class="task-title">${task.title}</span>
                        <span class="task-meta">${task.category} · ${task.priority}</span>
                    </div>
                </div>
                <button class="task-delete" onclick="deleteTask(${index})">&times;</button>
            `;
            taskList.appendChild(li);
        });
    }

    function addTask() {
        const title = prompt('New Task:');
        if (title) {
            appData.tasks.unshift({ id: Date.now(), title, category: 'Other', priority: 'high', completed: false });
            saveData(appData);
            renderTasks();
        }
    }

    function toggleTask(index) {
        appData.tasks[index].completed = !appData.tasks[index].completed;
        saveData(appData);
        renderTasks();
    }

    function deleteTask(index) {
        appData.tasks.splice(index, 1);
        saveData(appData);
        renderTasks();
    }

    updateHeader();
    renderTasks();
</script>

</body>
</html>
